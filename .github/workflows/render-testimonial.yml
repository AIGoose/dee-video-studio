name: Render Testimonial Video

on:
  workflow_dispatch:
    inputs:
      gdrive_file_id:
        description: 'Google Drive file ID of testimonial MOV'
        required: true
        default: '1f1qlgyLJSCQgpjrWflaqldsNE2fZ-_1X'
      participant_name:
        description: 'Participant name (lower-third)'
        required: false
        default: 'Peserta Training'
      participant_role:
        description: 'Participant role / org'
        required: false
        default: 'AI Transformation Series - Batch 2026'
      pull_quote:
        description: 'Pull quote text (Indonesian)'
        required: false
        default: 'Setelah training ini, tim kami langsung bisa praktek dan hasilnya nyata.'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg python3-pip
          pip3 install gdown huggingface_hub --quiet

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install HyperFrames CLI
        run: |
          npm install -g hyperframes
          npx hyperframes telemetry disable || true

      - name: Install chrome-headless-shell (perf-optimized browser)
        run: |
          # This unlocks beginFrame capture mode (~8x faster than screenshot fallback)
          OUTPUT=$(npx --yes @puppeteer/browsers install chrome-headless-shell@stable 2>&1)
          echo "$OUTPUT"
          SHELL_PATH=$(echo "$OUTPUT" | tail -1 | awk '{print $NF}')
          if [ ! -x "$SHELL_PATH" ]; then
            SHELL_PATH=$(find ~/.cache/puppeteer -name "chrome-headless-shell" -type f -executable 2>/dev/null | head -1)
          fi
          echo "Browser shell: $SHELL_PATH"
          echo "HYPERFRAMES_BROWSER_PATH=$SHELL_PATH" >> $GITHUB_ENV

      - name: Download testimonial MOV from Google Drive
        run: |
          mkdir -p assets
          python3 - <<'EOF'
          import gdown, os, sys
          fid = "${{ github.event.inputs.gdrive_file_id }}"
          gdown.download(f"https://drive.google.com/uc?id={fid}", "assets/testimoni_raw.MOV", quiet=False)
          if not os.path.exists("assets/testimoni_raw.MOV"):
              sys.exit(1)
          print(f"Downloaded {os.path.getsize('assets/testimoni_raw.MOV')/1024/1024:.1f} MB")
          EOF

      - name: Convert MOV to MP4 + downscale to 720p
        run: |
          # Pre-downscale to 720x1280 so HyperFrames doesn't waste cycles on a 4K source
          ffmpeg -y -i assets/testimoni_raw.MOV \
            -vf "scale=720:1280:force_original_aspect_ratio=increase,crop=720:1280" \
            -c:v libx264 -preset fast -crf 23 \
            -c:a aac -b:a 128k -movflags +faststart \
            assets/testimoni.mp4
          echo "Size: $(du -sh assets/testimoni.mp4)"

      - name: Get video duration
        run: |
          DUR=$(ffprobe -v quiet -show_entries format=duration \
            -of default=noprint_wrappers=1:nokey=1 assets/testimoni.mp4 | cut -d. -f1)
          echo "VIDEO_DURATION=$DUR" >> $GITHUB_ENV
          echo "Duration: ${DUR}s"

      - name: Build project folder
        run: |
          mkdir -p project/assets
          python3 scripts/patch_composition.py \
            --input compositions/testimonial.html \
            --output project/index.html \
            --name "${{ github.event.inputs.participant_name }}" \
            --role "${{ github.event.inputs.participant_role }}" \
            --quote "${{ github.event.inputs.pull_quote }}"
          sed -i "s/data-duration=\"90\"/data-duration=\"${VIDEO_DURATION}\"/" project/index.html
          cp assets/testimoni.mp4 project/assets/testimoni.mp4
          ls -lh project/ project/assets/

      - name: Render to MP4 (720x1280 @ 24fps)
        env:
          HYPERFRAMES_BROWSER_PATH: ${{ env.HYPERFRAMES_BROWSER_PATH }}
        run: |
          mkdir -p output
          TS=$(date +%Y%m%d-%H%M)
          OUT="output/dee-testimonial-${TS}.mp4"
          echo "OUTPUT_FILE=$OUT" >> $GITHUB_ENV
          echo "Browser shell path: $HYPERFRAMES_BROWSER_PATH"
          npx hyperframes render project \
            --output "$OUT" \
            --width 720 --height 1280 --fps 24 \
            --quality draft
          echo "Rendered: $OUT ($(du -sh $OUT | cut -f1))"

      - name: Upload to Hugging Face dataset
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 - <<'EOF'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          out = os.environ["OUTPUT_FILE"]
          fname = os.path.basename(out)
          api.upload_file(
              path_or_fileobj=out,
              path_in_repo=f"renders/{fname}",
              repo_id="AIgoose/video-renders",
              repo_type="dataset",
          )
          url = f"https://huggingface.co/datasets/AIgoose/video-renders/resolve/main/renders/{fname}"
          print(f"Video ready: {url}")
          print(f"::notice title=Video Ready::{url}")
          EOF

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: testimonial-mp4
          path: output/*.mp4
          retention-days: 7
